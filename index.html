        body {

        /* M3 State Layers (Hover/Focus/Press) */
        .m3-state-layer {
            position: relative;
            overflow: hidden;
            transition: transform 0.3s cubic-bezier(0.2, 0, 0, 1),
                        box-shadow 0.3s cubic-bezier(0.2, 0, 0, 1);
        }

        .m3-state-layer::after {
            content: '';
            position: absolute;
            inset: 0;
            background-color: currentColor;
            opacity: 0;
            transition: opacity 0.2s linear;
            pointer-events: none;
            border-radius: inherit;
        }

        .m3-state-layer:hover {
            transform: scale(1.02);
            box-shadow: 0px 4px 8px 3px rgba(0, 0, 0, 0.3), 0px 1px 3px 0px rgba(0, 0, 0, 0.4); /* M3 Elevation 2 Dark */
        }

        .m3-state-layer:hover::after {
            opacity: 0.08; /* M3 Hover State Layer */
        }

        .m3-state-layer:active::after {
            opacity: 0.12; /* M3 Pressed State Layer */
        }

        /* M3 Expressive Asymmetrical Shape */
        .shape-expressive {
            border-radius: 48px 16px 48px 16px;
            transition: border-radius 0.5s cubic-bezier(0.2, 0, 0, 1);
        }
        
        .shape-expressive:hover {
            border-radius: 16px 48px 16px 48px;
        }

        .fade-in {
            animation: m3-enter 0.6s cubic-bezier(0.2, 0, 0, 1) forwards;
            opacity: 0;
        }

        @keyframes m3-enter {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1E192C;
        }
        ::-webkit-scrollbar-thumb {
            background: #49454F;
            border-radius: 10px;
        }
    </style>

    <!-- Script to dynamically shape the favicon -->
    <script>
        window.addEventListener('load', () => {
            const profileImg = document.getElementById('profile-img');
            const faviconLink = document.getElementById('dynamic-favicon');
            
            // Create a canvas to draw the shaped image
            const canvas = document.createElement('canvas');
            const size = 128; // Standard high-res favicon size
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');

            const img = new Image();
            img.crossOrigin = "anonymous";
            img.src = profileImg.src;

            img.onload = () => {
                // Background color matching the new profile picture background (#1E192C)
                ctx.fillStyle = '#1E192C';
                
                // M3 Expressive shape parameters calculated for a 128px canvas
                // 48px -> ~37.5% of 128 = 48
                // 16px -> ~12.5% of 128 = 16
                const largeRad = 48;
                const smallRad = 16;

                // Draw the custom asymmetrical shape path
                ctx.beginPath();
                ctx.moveTo(largeRad, 0); 
                ctx.lineTo(size - smallRad, 0); 
                ctx.quadraticCurveTo(size, 0, size, smallRad); 
                ctx.lineTo(size, size - largeRad); 
                ctx.quadraticCurveTo(size, size, size - largeRad, size); 
                ctx.lineTo(smallRad, size); 
                ctx.quadraticCurveTo(0, size, 0, size - smallRad); 
                ctx.lineTo(0, largeRad); 
                ctx.quadraticCurveTo(0, 0, largeRad, 0); 
                ctx.closePath();

                // Fill background and clip to the shape
                ctx.fill();
                ctx.clip();

                // Draw the image inside the clipped path
                ctx.drawImage(img, 0, 0, size, size);

                // Update the favicon link with the newly generated shaped image
                faviconLink.href = canvas.toDataURL('image/png');
            };
        });
    </script>
